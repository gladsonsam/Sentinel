# Copy `.env.example` → `.env`, then: docker compose up -d
#
# Build server from this tree: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Traefik, etc.: https://github.com/gladsonsam/Sentinel/wiki/Deployment

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitor}
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env — see .env.example}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d ${POSTGRES_DB:-monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/gladsonsam/sentinel/server:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-monitor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-monitor}
      LOG_FORCE_COLOR: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PUBLISH_PORT:-9000}:9000"

volumes:
  pgdata:
