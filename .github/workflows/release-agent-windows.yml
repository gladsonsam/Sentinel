name: release-agent-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent/ui-src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agent -> target

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset -y

      - name: Install UI dependencies
        shell: pwsh
        working-directory: agent/ui-src
        run: npm install --no-audit --no-fund

      - name: Build + publish MSI to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: agent
          tagName: ${{ github.ref_name }}
          releaseName: Sentinel Agent ${{ github.ref_name }}
          releaseBody: Automated build for ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
