name: release-agent-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent/ui-src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agent -> target

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset -y

      - name: Install UI dependencies
        shell: pwsh
        run: npm --prefix agent/ui-src install --no-audit --no-fund

      - name: Build + publish MSI to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: agent
          tagName: ${{ github.ref_name }}
          releaseName: Sentinel Agent ${{ github.ref_name }}
          releaseBody: Automated build for ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false

      - name: Generate latest.json (Tauri updater)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bundleDir = Join-Path $PWD "agent/target/release/bundle/msi"
          if (-not (Test-Path $bundleDir)) { throw "Bundle directory not found: $bundleDir" }

          $msi = Get-ChildItem $bundleDir -Filter *.msi | Select-Object -First 1
          if (-not $msi) { throw "No MSI found in $bundleDir" }

          $sigPath = "$($msi.FullName).sig"
          if (-not (Test-Path $sigPath)) { throw "Missing signature file: $sigPath (did signing env vars exist?)" }
          $sig = (Get-Content $sigPath -Raw).Trim()

          $tag = "${{ github.ref_name }}"
          $url = "https://github.com/gladsonsam/Sentinel/releases/download/$tag/$($msi.Name)"
          $pubDate = (Get-Date).ToUniversalTime().ToString("o")

          $json = @{
            version  = $tag
            notes    = "Automated update for $tag."
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                url       = $url
                signature = $sig
              }
            }
          } | ConvertTo-Json -Depth 6

          $outPath = Join-Path $PWD "latest.json"
          $json | Out-File -FilePath $outPath -Encoding utf8 -NoNewline
          Write-Host "Wrote $outPath"

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
