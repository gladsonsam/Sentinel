blueprint:
  name: "Sentinel Alert"
  description: "Triggers on sentinel_alert and sends an actionable push to a selected mobile_app device, deep-linking to the agent activity timeline at the event time."
  domain: automation

  input:
    phone_device:
      name: Phone (Home Assistant Companion device)
      description: "Pick the mobile device that should receive the push."
      selector:
        device:
          filter:
            integration: mobile_app

    title_prefix:
      name: Title prefix
      default: "Sentinel"
      selector:
        text: {}

mode: queued

trigger:
  - platform: event
    event_type: sentinel_alert

variables:
  phone_device: !input phone_device
  title_prefix: !input title_prefix

  # Companion notify service is derived from the device name.
  notify_service: >-
    {{ 'notify.mobile_app_' ~ (device_attr(phone_device, 'name') | slugify) }}

  # Prefer server-provided deep link (requires PUBLIC_BASE_URL on the Sentinel server).
  deep_url: >-
    {{ trigger.event.data.dashboard_activity_url
       | default(trigger.event.data.dashboard_url | default('')) }}

action:
  - service: "{{ notify_service }}"
    data:
      title: "{{ title_prefix }}: {{ trigger.event.data.rule_name }}"
      message: >-
        {{ trigger.event.data.agent_name }} ({{ trigger.event.data.channel }}):
        {{ trigger.event.data.snippet }}
      data:
        # Tap notification body → open deep link
        # iOS uses `url`; Android uses `clickAction`.
        url: "{{ deep_url }}"
        clickAction: "{{ deep_url }}"

